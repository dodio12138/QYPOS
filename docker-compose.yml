services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-qypos}
      POSTGRES_USER: ${POSTGRES_USER:-qypos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qypos_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-qypos} -d ${POSTGRES_DB:-qypos}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://qypos:qypos_password@postgres:5432/qypos}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      API_PORT: ${API_PORT:-4000}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  printer-service:
    build:
      context: .
      dockerfile: apps/printer-service/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://qypos:qypos_password@postgres:5432/qypos}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      PRINTER_DEFAULT_HOST: ${PRINTER_DEFAULT_HOST:-192.168.1.100}
      PRINTER_DEFAULT_PORT: ${PRINTER_DEFAULT_PORT:-9100}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
