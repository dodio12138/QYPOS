name: 💡 功能建议 / Feature Request
description: 提出新功能或改进建议 / Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: "## 💡 功能建议 / Feature Request\n\n欢迎提出想法！请先搜索现有 Issues 确认未被提出过。\n\nWelcome! Please search existing issues first to avoid duplicates."
  - type: textarea
    id: problem
    attributes:
      label: "解决的问题 / Problem"
      description: "这个功能要解决什么问题？描述你的使用场景。 / What problem does this feature solve? Describe your use case."
      placeholder: "当我想...时，目前无法... / When I want to..., I currently cannot..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: "建议方案 / Proposed Solution"
      description: "你期望这个功能如何工作 / How you'd like this feature to work"
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: "替代方案 / Alternatives Considered"
      description: "你考虑过哪些替代方案或临时解决办法 / Any workarounds or alternatives you've considered"
  - type: textarea
    id: context
    attributes:
      label: "附加上下文 / Additional Context"
      description: "截图、参考链接、或任何有助于理解该需求的信息 / Screenshots, reference links, or any additional context"
  - type: dropdown
    id: scope
    attributes:
      label: "影响范围 / Scope"
      options:
        - "🛎️ 点餐前台 / POS Front Desk"
        - "🖨️ 后厨打印 / Kitchen Printing"
        - "📊 后台管理 / Back Office"
        - "📡 API 服务 / API Server"
        - "🔧 运维 / Operations"
        - "🏗 部署/基础设施 / Deployment/Infra"
        - "📝 文档 / Documentation"
        - "其他 / Other"
    validations:
      required: true
